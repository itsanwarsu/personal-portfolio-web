<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator v2.0</title>
    <style>
     body {
      display: flex; 
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #1e1e1e;
      font-family: Arial, Sans-Serif;
     } 
     
     .calculator {
       background: #2c2c2c;
       padding: 30px;
       border-radius: 20px;
       border: 15px solid black;
       box-shadow: 0 0 15px rgba(0,0,0,0.5);
       width: 250px;
     }
     
     #display {
       width: 90%;
       height: 60px;
       margin-bottom: 15px;
       font-size: 24px;
       text-align: right;
       padding: 10px;
       border: none;
       border-radius: 10px;
       background: #444;
       color: white;
     }
     
     .buttons{
       display: grid;
       grid-template-columns: repeat(4,1fr);
       gap: 10px;
     }
     
     button {
       height: 50px;
       font-size: 20px;
       border: none;
       border-radius: 10px;
       cursor: pointer;
       background: #666;
       color: white;
       transition: 0.2s;
     }
     
     button:hover {
       background: #999;
     }
     .operator {
       background: orange;
     }
     .operator:hover {
       background: darkorange;
     }
     .clear {
       background: red;
     }
     .clear:hover {
       background: darkred;
     }
     .equal {
       background: green;
     }
     .equal:hover {
       background: darkgreen;
     }
     .history {
       margin-top: 20px;
       background: #eee;
       padding: 10px;
       border-radius: 10px;
       display: none;
       max-height: 150px;
       overflow-y: auto;
     }
    </style>
    </head>
    <body>
      <div class="calculator">
        <input type="text" id="display" disabled>
        <div class="buttons">
          <button class="clear" onclick="cleardisplay()">AC</button>
          <button class="operator" onclick="appendValue('/')">/</button>
          <button class="operator" onclick="appendValue('*')">*</button>
          <button class="operator"onclick="appendValue('-')">-</button>
          
          <button onclick="appendValue('7')">7</button>
          <button onclick="appendValue('8')">8</button>
          <button onclick="appendValue('9')">9</button>
          <button class="operator"onclick="appendValue('+')">+</button>
          
          <button onclick="appendValue('4')">4</button>
          <button onclick="appendValue('5')">5</button>
          <button onclick="appendValue('6')">6</button>
          <button onclick="appendValue('1')">1</button>
          
          <button onclick="appendValue('2')">2</button>
          <button onclick="appendValue('3')">3</button>
          <button onclick="appendValue('0')">0</button>
          <button onclick="appendValue('.')">.</button>
          
          <button class="equal"onclick="calculate()">=</button>
          <button onclick="slice()">⌫</button>
          <button onclick="toggleHistory()">H</button>
          <button onclick="clearHistory()">CH</button>
        </div>
       
        <div class="history" id="historyBox">
         <h2 style="font-size:15px">Riwayat Kalkulasi
         </h2>
         <div id="historyList">
           
         </div>
         
          
        </div>
      </div>
      <script>
        let historyData = JSON.parse(
        localStorage.getItem(
"calculatorHistory"
)
         ) || [];
        const display = document.getElementById("display")
        
        function appendValue(value){
        display.value += value;
        }
        function cleardisplay() {
          display.value = "";
        }
        function slice() {
          display.value = display.value.slice(0, -1);
        }
        function clearHistory() {
          historyData = [];
          updateHistory();
          localStorage.removeItem(
          "calculatorHistory"
          );
        }
        
       function calculate() {
         const expression = display.value;
         try {
           const result = eval(expression);
           historyData.push(`${expression} = ${result}`);
           localStorage.setItem(
           "calculatorHistory",
           JSON.stringify(historyData)
           );
           updateHistory();
          
           display.value=result;
         }
         catch {
           alert("Error");
         }
       }
        
        function updateHistory() {
        const historyList = document.getElementById("historyList");
        historyList.innerText = "";

        historyData.forEach(item => {
            const div = document.createElement("div");
            div.className = "history-item";
            div.textContent = item;
            historyList.appendChild(div);
        });
    }

    function toggleHistory() {
        const historyBox = document.getElementById("historyBox");

        if (historyBox.style.display === "none" || historyBox.style.display === "") {
            historyBox.style.display = "block";
        } else {
            historyBox.style.display = "none";
        }
    }
    updateHistory();
      </script>
    </body>
</html>
